<!DOCTYPE html>
<html>
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HanamiYa">
  <meta name="theme-color" content="#121212">

  <link rel="apple-touch-icon" href="https://github.com/Hanamiya-Song/songlist/blob/main/7808d4bc-bbc7-446e-85a7-ea2b581164bb.jpg?raw=true">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>HanamiYa</title>
  <style>
    :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; --primary: #03dac6; --error: #cf6679; --success: #28a745; --border: #333; }
    
    html { background-color: var(--bg); height: 100%; }

    body {
      font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
      margin: 0; padding: 0;
      background: linear-gradient(rgba(18, 18, 18, 0.85), rgba(18, 18, 18, 0.85)), url("https://github.com/Hanamiya-Song/songlist/blob/main/7808d4bc-bbc7-446e-85a7-ea2b581164bb.jpg?raw=true");
      background-repeat: no-repeat; background-position: center; background-size: cover; background-attachment: fixed;
      min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column;
    }

    .header-fixed { background: #1a1a1a; padding: 10px 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100; padding-top: calc(10px + env(safe-area-inset-top)); }
    .header-row { display: flex; justify-content: space-between; align-items: center; min-height: 44px; gap: 5px; flex-wrap: wrap; }
    .title-group { display: flex; flex-direction: column; line-height: 1.2; flex: 1; min-width: 120px; }
    #guestTitle { font-family: 'Orbitron', sans-serif ;font-size: 20px; font-weight: bold; color: var(--accent); }
    .sub-desc { font-size: 10px; color: #888; margin-top: 2px; }
    #timerDisplay { font-size: 26px; font-weight: bold; font-family: monospace; color: var(--primary); display: none; }
    .admin-only { display: none; }
    #loginBtn { background: transparent; color: #666; border: 1px solid #444; padding: 8px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; white-space: nowrap; }
    #actionBtn { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; min-width: 95px; cursor: pointer; }
    #actionBtn.active { background: var(--error); }
    .view-selector { display: none; background: #252525; border-radius: 10px; padding: 3px; margin-top: 10px; gap: 4px; }
    .view-tab { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px; font-size: 13px; font-weight: bold; border-radius: 8px; cursor: pointer; color: #888; transition: all 0.2s; }
    .view-tab.active { background: var(--card); color: var(--accent); }
    
    .content-area { flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; }
    
    .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; padding: 0; box-sizing: border-box; overflow: hidden; }
    .page.active { display: flex; }

    #page-log { padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .sticky-controls { position: sticky; top: 0; z-index: 50; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(8px); margin: 0; width: 100%; padding: 0 15px 10px 15px; border-bottom: 1px solid var(--border); box-sizing: border-box; }
    #tabContainer { display: flex; overflow-x: auto; gap: 8px; margin: 0; width: 100%; padding: 10px 0; flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; box-sizing: border-box; }
    #tabContainer::-webkit-scrollbar { display: none; }
    .artist-tab { padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; color: #888; flex-shrink: 0; transition: all 0.2s;}
    .artist-tab.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }
    
    input, select, textarea { background: var(--card) !important; color: white !important; border: 1px solid var(--border) !important; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: var(--accent) !important; outline: none; }
    
    .search-row { display: flex; gap: 8px; height: 38px; margin-bottom: 8px; }
    #searchBox { flex: 1; height: 100%; padding: 0 12px; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin: 0; }
    #sortSelect { width: 105px; height: 100%; border-radius: 10px; font-size: 11px; cursor: pointer; padding: 0 5px; box-sizing: border-box; text-align: center; }

    .style-toggle { display: flex; background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); height: 35px;}
    .style-toggle label { flex: 1; text-align: center; color: #888; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;}
    .style-toggle input[type="radio"] { display: none; }
    .style-toggle input[type="radio"]:checked + span { color: var(--accent); background: rgba(187, 134, 252, 0.15); }
    .style-toggle span { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    
    #songList { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; padding: 10px 0 20px 0; margin: 0; width: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    #songList::-webkit-scrollbar { width: 4px; }
    #songList::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    
    .songBtn { 
      width: calc(100% - 30px); margin: 0 auto; background: rgba(30, 30, 30, 0.7); color: var(--text); border: 1px solid var(--border); padding: 30px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; backdrop-filter: blur(5px); box-sizing: border-box;
      transition: transform 0.1s ease, background-color 0.2s ease;
      position: relative; overflow: hidden;
    }
    .songBtn:active { transform: scale(0.97); background-color: rgba(255, 255, 255, 0.15); }

    .btn-main { display: flex; flex-direction: column; flex: 1; text-align: left; overflow: hidden; }
    .btn-title { font-size: 15px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-artist { font-size: 11px; color: #888; }
    .btn-date { font-size: 12px; color: var(--accent); font-family: monospace; margin-left: 10px; white-space: nowrap; }
    
    .admin-panel { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); flex-shrink: 0; }
    .admin-panel-title { font-size: 11px; color: var(--accent); margin-bottom: 10px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
    
    .add-row { display: flex; gap: 8px; margin-bottom: 8px; width: 100%; box-sizing: border-box; }
    .add-row input { flex: 1; min-width: 0; padding: 10px; border-radius: 5px; font-size: 13px; box-sizing: border-box; }
    .add-row select { padding: 10px; border-radius: 5px; font-size: 13px; width: 100px; box-sizing: border-box; }
    .dark-btn { width: 100%; padding: 12px; border-radius: 8px; background: #333; color: white; font-weight: bold; border: 1px solid #444; cursor: pointer; transition: background 0.2s; }
    .dark-btn:active { background: #444; }
    
    .log-container { display: flex; gap: 10px; margin-bottom: 10px; }
    #resultArea { flex: 1; height: 160px; background: #0a0a0a !important; color: #bbb !important; border: 1px solid #333 !important; padding: 12px; font-family: monospace; font-size: 12px; border-radius: 10px; resize: none; box-sizing: border-box; line-height: 1.4; }
    .log-side-btns { display: flex; flex-direction: column; gap: 8px; width: 80px; }
    .log-side-btns button { flex: 1; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; padding: 5px; }
    .btn-copy { background: #252525; color: #ddd; }
    .btn-image { background: rgba(187, 134, 252, 0.1); color: var(--accent); border-color: rgba(187, 134, 252, 0.3) !important; }
    .btn-random { background: #252525; color: #ddd; }

    #randomSelectionArea { background: var(--card); padding: 12px; border-radius: 10px; border: 1px dashed var(--accent); margin-bottom: 15px; }
    
    .msg-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
    .msg-btn:active { background: rgba(187, 134, 252, 0.2); }
    #msgModal textarea { width: 100%; height: 150px; padding: 15px; font-size: 16px; outline: none; box-sizing: border-box; resize: none; border-radius: 10px;}
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: var(--accent); }
    .modal-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .request-item { display: flex; align-items: center; background: #252525; padding: 12px; border-radius: 10px; border: 1px solid #333; gap: 10px; }
    .del-btn { background: var(--error); color: white; border: none; border-radius: 5px; padding: 8px 12px; font-size: 12px; cursor: pointer; }
    
    .confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 4000; }
    .confirm-card { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; text-align: center; border: 1px solid var(--accent); max-width: 400px; }
    
    #loadingOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:9999; color:var(--accent); font-weight:bold; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
    .empty-state { text-align: center; padding: 40px 20px; color: #888; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .empty-icon { font-size: 48px; opacity: 0.5; }
    #toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; font-weight: bold; padding: 12px 24px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10000; transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; white-space: nowrap; font-size: 14px; }
    #toast.show { bottom: 40px; }
    #pageTopBtn { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: var(--accent); color: #000; border: none; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    #pageTopBtn.show { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>

  <div id="loadingOverlay">LOADING DATA...</div>
  <div id="toast">メッセージ</div>

  <div class="header-fixed">
    <div class="header-row">
      <div id="timerDisplay">00:00</div>
      
      <div class="title-group" id="titleContainer">
        <div id="guestTitle">HanamiYa</div>
        <div class="sub-desc" id="guestDesc">曲をタップしてリクエスト</div>
      </div>

      <div style="display:flex; gap:8px; align-items:center;">
        <div class="admin-only" id="adminControls" style="gap:10px; align-items:center; display:none;">
          <button id="requestBtn" onclick="openRequestModal()" style="background:#333; border:none; border-radius:50%; width:40px; height:40px; position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer;">📩<span id="requestBadge" style="position:absolute; top:-5px; right:-5px; background:var(--error); color:white; border-radius:50%; padding:2px 6px; font-size:10px; display:none;">0</span></button>
          <button id="actionBtn" onclick="handleAction()"> START</button>
        </div>
        <button class="msg-btn" id="guestMsgBtn" onclick="openMsgModal()">✉️ メッセージ</button>
        <button id="loginBtn" onclick="tryLogin()">LogIn</button>
      </div>
    </div>

    <div id="adminTabNav" class="view-selector admin-only">
      <div id="nav-music" class="view-tab active" onclick="switchView('music')"> 曲選択</div>
      <div id="nav-log" class="view-tab" onclick="switchView('log')"> 記録/追加</div>
    </div>
  </div>

  <div class="content-area">
    <div id="page-music" class="page active">
      <div class="sticky-controls">
        <div id="tabContainer">読み込み中...</div>
        <div class="search-row">
          <input type="text" id="searchBox" placeholder="🔍 曲名・アーティスト..." oninput="onSearchInput()">
          <select id="sortSelect" onchange="filterSongs()">
            <option value="artist">アーティスト順</option>
            <option value="name">曲名順</option>
            <option value="date">直近歌った順</option>
          </select>
        </div>
        <div class="style-toggle">
          <label><input type="radio" name="playStyle" value="all" checked onchange="filterSongs()"><span>すべて</span></label>
          <label><input type="radio" name="playStyle" value="弾き語り" onchange="filterSongs()"><span> 弾き語り</span></label>
          <label><input type="radio" name="playStyle" value="カラオケ" onchange="filterSongs()"><span> カラオケ</span></label>
        </div>
      </div>
      <div id="songList"></div>
    </div>

    <div id="page-log" class="page">
      
      <div id="randomSelectionArea" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <strong style="color:var(--accent); font-size:12px;">🎲 本日の20選</strong>
          <button onclick="document.getElementById('randomSelectionArea').style.display='none'" style="background:none; border:none; color:#888; font-size:16px;">×</button>
        </div>
        <div id="randomList" style="display: flex; flex-direction: column; gap: 5px; max-height: 150px; overflow-y: auto;"></div>
      </div>

      <div class="admin-panel">
        <div class="admin-panel-title">📝 配信ログ</div>
        <div class="log-container">
          <textarea id="resultArea" readonly placeholder="STARTを押すとここにログが溜まります"></textarea>
          <div class="log-side-btns">
            <button class="btn-copy" onclick="copyLog()">📋<br>コピー</button>
            <button class="btn-image" onclick="downloadSetlistImage()">🖼️<br>画像保存</button>
            <button class="btn-random" onclick="generateRandom20()">🎲<br>20選</button>
          </div>
        </div>
      </div>

      <div class="admin-panel">
        <div class="admin-panel-title">＋ 新曲をNotionへ追加</div>
        <div class="add-row">
          <input type="text" id="newSong" placeholder="曲名">
          <input type="text" id="newArtist" placeholder="アーティスト">
        </div>
        <div class="add-row">
          <select id="newStatus">
            <option value="フル">フル</option>
            <option value="ワンコーラス">ワンコーラス</option>
            <option value="２番まで">２番まで</option>
          </select>
          <button class="dark-btn" onclick="addNewSong()">Notionに追加</button>
        </div>
      </div>

      <div style="display:flex; gap:8px; margin-bottom:15px; flex-shrink:0;">
        <button class="dark-btn" onclick="fetchData(true, true)" style="flex:1;">🔄 最新データに同期</button>
        <button class="dark-btn" onclick="logout()" style="flex:0.5; color:#cf6679; border-color:#522;">↳ ログアウト</button>
      </div>
    </div>
  </div>

  <div id="requestModal" class="modal">
    <div class="modal-header">
      <h3>📥 リクエスト・メッセージ</h3>
      <button onclick="closeRequestModal()" style="background:none; border:none; color:#888; font-size:28px;">×</button>
    </div>
    <div class="modal-content" style="display: flex; flex-direction: column; gap: 20px;">
      <div>
        <h4 style="color: var(--accent); font-size: 12px; margin-bottom: 10px; border-bottom: 1px solid #333;">リクエスト</h4>
        <div id="modalSongList"></div> 
      </div>
      <div>
        <h4 style="color: var(--primary); font-size: 12px; margin-bottom: 10px; border-bottom: 1px solid #333;">メッセージ</h4>
        <div id="messageList"></div>
      </div>
    </div>
  </div>

  <div id="requestConfirmOverlay" class="confirm-overlay" style="z-index: 5000;">
    <div class="confirm-card">
      <h3 id="requestConfirmTitle" style="color:var(--accent);"></h3>
      <p style="font-size: 14px; margin: 15px 0; color: #ffffff; font-weight: bold;">この曲をリクエストしますか？</p>
      <div style="display:flex; gap:12px; margin-top:25px;">
        <button onclick="closeRequestConfirm()" style="flex:1; padding:15px; background:#444; color:white; border-radius:10px; border:none;">やめる</button>
        <button id="execRequestBtn" style="flex:1; padding:15px; background:var(--accent); color:black; font-weight:bold; border-radius:10px; border:none;">リクエスト！</button>
      </div>
    </div>
  </div>

  <div id="confirmOverlay" class="confirm-overlay">
    <div class="confirm-card">
      <h3 id="confirmTitle" style="color:var(--accent);"></h3>
      <p style="font-size: 14px; margin: 15px 0; color: #ffffff; font-weight: bold;">この曲を歌いますか？</p>
      <div style="display:flex; gap:12px; margin-top:25px;">
        <button onclick="closeConfirm()" style="flex:1; padding:15px; background:#444; color:white; border-radius:10px; border:none;">やめる</button>
        <button id="execSingBtn" style="flex:1; padding:15px; background:var(--primary); color:black; font-weight:bold; border-radius:10px; border:none;">歌う！</button>
      </div>
    </div>
  </div>

  <div id="msgModal" class="modal">
    <div class="modal-header">
      <h3>✉️ MESSAGE</h3>
      <button onclick="closeMsgModal()" style="background:none; border:none; color:#888; font-size:28px;">×</button>
    </div>
    <div class="modal-content">
      <p style="font-size:12px; color:#888;">花宮へのメッセージを送れます。</p>
      <textarea id="chatInput" placeholder="メッセージを入力してください..."></textarea>
      <button onclick="sendChatMessage()" style="width:100%; padding:15px; background:var(--accent); color:black; font-weight:bold; border-radius:12px; border:none; margin-top:15px; font-size:16px;">送信する</button>
    </div>
  </div>

  <button id="pageTopBtn" onclick="scrollToTop()">↑</button>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwiFEMX9Wj6aBubEpqx695kuTCTDzEvBnWMny1QzMGLej1lVINNkC5Dc2Fg4MwkRleoDA/exec";
    let IS_ADMIN = false;
    let startTime = null, isRunning = false, allSongs = [], currentRequests = [], currentTab = "すべて";
    const OHMORI_GROUP = ["Mrs. GREEN APPLE", "Siip", "大森元貴"];
    
    let searchTimeout;
    let toastTimeout;

    // --- 【修正】完全版のターゲット判定処理 ---
    // --- 【確定版】GASから届く文字列データに対応 ---
    const isTargetType = (song, target) => {
      // GASで type という項目名にして送っているので song.type を見る
      if (!song.type) return false;
      
      // song.type は "弾き語り" や "弾き語り,J-POP" という文字列なので、
      // includes で「弾き語り」などの文字が含まれているかチェックする
      return String(song.type).includes(target);
    };
    // --------------------------------------------

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.background = isError ? "var(--error)" : "var(--accent)";
      toast.style.color = isError ? "white" : "black";
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    function sanitize(str) {
      if (typeof str !== 'string') return str;
      return str.replace(/[&<>"']/g, function(m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
      });
    }

    async function callGAS(params, showLoading = false) {
      if (showLoading) document.getElementById('loadingOverlay').style.display = 'flex';
      
      const adminActions = ['verifyAuth', 'addSong', 'deleteRequest', 'startFromExternal', 'clearExternalStart', 'updateDate', 'checkExternalStart', 'getRequests'];
      if (adminActions.includes(params.action)) {
        params.pass = sessionStorage.getItem('adminPass') || "";
      }

      const queryString = new URLSearchParams(params).toString();
      try {
        const response = await fetch(`${GAS_URL}?${queryString}`);
        return await response.json();
      } catch (e) { 
        console.error("GAS通信エラー:", e);
        if (showLoading) {
          showToast("通信エラーが発生しました", true);
        }
      }
      finally { 
        if (showLoading) document.getElementById('loadingOverlay').style.display = 'none'; 
      }
    }

    async function tryLogin() { 
      const inputPass = prompt("パスワードを入力してください"); 
      if (!inputPass) return;

      sessionStorage.setItem('adminPass', inputPass); 
      const res = await callGAS({ action: 'verifyAuth' }, true);
      
      if (res && res.success) {
        applyAdminMode(true);
        showToast("ログインしました");
      } else {
        sessionStorage.removeItem('adminPass'); 
        alert("パスワードが間違っています");
      }
    }

    function logout() { 
      sessionStorage.removeItem('adminPass');
      localStorage.setItem('isAdminLoggedIn', 'false'); 
      location.reload(); 
    }

    window.onload = async () => {
      const loggedIn = localStorage.getItem('isAdminLoggedIn') === 'true' && sessionStorage.getItem('adminPass');
      applyAdminMode(!!loggedIn);
      if (loggedIn) syncWithServer();
      fetchData(false); 
    };

    async function fetchData(showUI = false, forceFetch = false) {
      const cached = localStorage.getItem('cachedSongs');
      if (cached && !forceFetch) {
        allSongs = JSON.parse(cached);
        renderAll();
      } else if (showUI || !cached) {
        document.getElementById('loadingOverlay').style.display = 'flex';
      }

      const songs = await callGAS({ action: "getSongs" }, false); 

      console.log(songs); 
      
      if (songs) { 
        allSongs = songs; 
        localStorage.setItem('cachedSongs', JSON.stringify(songs)); 
        renderAll(); 
        if (forceFetch) showToast("最新データに同期しました");
      }
      
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    function onSearchInput() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        filterSongs();
      }, 300); 
    }

    function renderAll() {
      const counts = {};
      let ohmoriTotal = 0;
      let acousticTotal = 0; 
      let karaokeTotal = 0;  

      allSongs.forEach(s => {
        const artist = s.artist || "不明";

        console.log(s); 
        console.log(s.type);
        
        if (OHMORI_GROUP.includes(artist)) ohmoriTotal++;
        
        // タブの件数カウント
        if (isTargetType(s, "弾き語り")) acousticTotal++;
        if (isTargetType(s, "カラオケ")) karaokeTotal++;

        if (!OHMORI_GROUP.includes(artist)) {
          counts[artist] = (counts[artist] || 0) + 1;
        }
      });
      

      const majorArtists = Object.keys(counts).filter(a => counts[a] >= 10).sort();
      
      const tabs = [{ id: "すべて", label: `すべて (${allSongs.length})` }];
      
      if (acousticTotal > 0) tabs.push({ id: "弾き語り", label: `弾き語り (${acousticTotal})` });
      if (karaokeTotal > 0) tabs.push({ id: "カラオケ", label: `カラオケ (${karaokeTotal})` });
      
      if (ohmoriTotal > 0) tabs.push({ id: "大森元貴曲", label: `大森元貴曲 (${ohmoriTotal})` });
      majorArtists.forEach(name => tabs.push({ id: name, label: `${name} (${counts[name]})` }));
      
      const container = document.getElementById('tabContainer');
      container.innerHTML = '';
      tabs.forEach(tab => {
        const div = document.createElement('div');
        div.className = `artist-tab ${tab.id === currentTab ? 'active' : ''}`;
        div.textContent = tab.label;
        div.onclick = () => { currentTab = tab.id; renderAll(); };
        container.appendChild(div);
      });
      filterSongs();
    }

    function filterSongs() {
      const query = document.getElementById('searchBox')?.value.toLowerCase() || "";
      const sortType = document.getElementById('sortSelect')?.value || "artist";
      const container = document.getElementById('songList');
      container.innerHTML = '';
      
      let f = [...allSongs];

      // --- 1. タブによる絞り込み ---
      if (currentTab === "すべて") {
        // 絞り込みなし
      } else if (currentTab === "大森元貴曲") {
        f = f.filter(s => OHMORI_GROUP.includes(s.artist || ""));
      } else if (currentTab === "弾き語り") {
        f = f.filter(s => isTargetType(s, "弾き語り"));
      } else if (currentTab === "カラオケ") {
        f = f.filter(s => isTargetType(s, "カラオケ"));
      } else {
        f = f.filter(s => (s.artist || "") === currentTab);
      }

      // --- 1.5 ラジオボタン(弾き語り/カラオケ トグル)による絞り込み ---
      const playStyle = document.querySelector('input[name="playStyle"]:checked')?.value || "all";
      if (playStyle === "弾き語り") {
        f = f.filter(s => isTargetType(s, "弾き語り"));
      } else if (playStyle === "カラオケ") {
        f = f.filter(s => isTargetType(s, "カラオケ"));
      }

      // --- 2. 検索キーワードによる絞り込み ---
      if (query) {
        f = f.filter(s => 
          (s.name || "").toLowerCase().includes(query) || 
          (s.artist || "").toLowerCase().includes(query)
        );
      }

      // --- 3. ソート処理 ---
      f.sort((a, b) => {
        if (sortType === "name") return (a.name || "").localeCompare((b.name || ""), 'ja');
        if (sortType === "date") {
          const dateA = new Date(a.lastSung || "1900-01-01");
          const dateB = new Date(b.lastSung || "1900-01-01");
          return dateB - dateA;
        }
        return (a.artist || "").localeCompare((b.artist || ""), 'ja');
      });

      // --- 4. 描画処理 ---
      if (f.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">😢</div><div>見つかりませんでした</div></div>`;
        return;
      }

      f.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'songBtn';
        btn.onclick = () => onSongTap(s);
        
        const mainDiv = document.createElement('div');
        mainDiv.className = 'btn-main';
        mainDiv.innerHTML = `<span class="btn-title">${s.name || "無名"}</span><span class="btn-artist">${s.artist || "不明"}</span>`;
        
        const dateSpan = document.createElement('span');
        dateSpan.className = 'btn-date';
        dateSpan.textContent = (s.lastSung && s.lastSung !== "1900-01-01") ? s.lastSung : "";
        
        btn.appendChild(mainDiv);
        btn.appendChild(dateSpan);
        container.appendChild(btn);
      });
    }

    function onSongTap(song, isFromRequest = false, requestId = null) {
      if (IS_ADMIN) {
        showAdminMenu(song, isFromRequest, requestId);
      } else {
        const titleEl = document.getElementById('requestConfirmTitle');
        titleEl.textContent = song.name || "不明な曲";
        
        const execBtn = document.getElementById('execRequestBtn');
        execBtn.onclick = () => {
          callGAS({ action: "sendRequest", name: song.name, artist: song.artist }, true)
            .then(() => {
              showToast("リクエストを送信しました！");
              closeRequestConfirm();
            });
        };
        
        document.getElementById('requestConfirmOverlay').style.display = 'flex';
      }
    }

    function showAdminMenu(song, isFromRequest, requestId) {
      const titleEl = document.getElementById('confirmTitle');
      titleEl.textContent = song.name || "不明な曲";
      
      const oldLinks = document.getElementById('adminLinkGroup');
      if (oldLinks) oldLinks.remove();
      const linkGroup = document.createElement('div');
      linkGroup.id = 'adminLinkGroup';
      linkGroup.style = "display:flex; flex-direction:column; gap:10px; margin-bottom:20px;";
      
      const links = [{ label: " U-FRET", url: song.ufret }, { label: " Chordwiki", url: song.chordwiki }];
      let hasLink = false;
      links.forEach(link => {
        if (link.url && link.url.trim() !== "") {
          const a = document.createElement('a');
          a.href = link.url; a.target = "_blank"; a.textContent = link.label;
          a.style = "display:block; padding:12px; background:#333; color:var(--primary); text-decoration:none; border-radius:10px; font-size:13px; font-weight:bold; border:1px solid #444;";
          linkGroup.appendChild(a);
          hasLink = true;
        }
      });
      if (hasLink) titleEl.after(linkGroup);
      
      document.getElementById('execSingBtn').onclick = async () => {
        if (!isRunning) return alert("STARTを押してください");
        executeSing(song);
        if (isFromRequest && requestId) callGAS({ action: "deleteRequest", id: requestId });
        closeConfirm();
        if (isFromRequest) closeRequestModal();
      };
      document.getElementById('confirmOverlay').style.display = 'flex';
    }

    async function handleAction() {
      if (!isRunning) {
        const res = await callGAS({ action: 'startFromExternal' });
        if (res && res.startTime) {
          startTime = parseInt(res.startTime);
          isRunning = true;
          updateButtonUI(true);
        }
      } else {
        if (confirm("配信を終了しますか？")) {
          isRunning = false;
          updateButtonUI(false);
          await callGAS({ action: 'clearExternalStart' });
          localStorage.removeItem('setlist_backup');
          document.getElementById('resultArea').value = ""; 
        }
      }
    }

    function updateButtonUI(active) {
      const btn = document.getElementById('actionBtn');
      if (btn) {
        btn.textContent = active ? "🛑 STOP" : "🎥 START";
        btn.classList.toggle('active', active);
      }
    }

    function executeSing(song) {
      const timeStr = document.getElementById('timerDisplay').innerText;
      const logLine = `${timeStr} ${song.name || "無名"}\n`;
      const area = document.getElementById('resultArea');
      
      area.value += logLine;
      localStorage.setItem('setlist_backup', area.value);
      showToast("記録しました！");
      
      if (song.id) callGAS({ action: "updateDate", id: song.id });
    }

    function applyAdminMode(isAdmin) {
      IS_ADMIN = isAdmin;
      localStorage.setItem('isAdminLoggedIn', isAdmin);
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'flex' : 'none');
      document.getElementById('titleContainer').style.display = isAdmin ? 'none' : 'flex';
      document.getElementById('loginBtn').style.display = isAdmin ? 'none' : 'block';
      document.getElementById('timerDisplay').style.display = isAdmin ? 'block' : 'none';
      document.getElementById('guestMsgBtn').style.display = isAdmin ? 'none' : 'block';
      if (isAdmin) setInterval(checkRequests, 3000);
    }

    async function sendChatMessage() {
      const inputEl = document.getElementById('chatInput');
      const rawMsg = inputEl.value;
      if (!rawMsg.trim()) return;

      const safeMsg = sanitize(rawMsg);
      await callGAS({ action: "sendRequest", name: safeMsg, artist: "💬 MESSAGE" }, true);

      inputEl.value = "";
      closeMsgModal();
      showToast("メッセージを送信しました！");
    }

    function openMsgModal() { document.getElementById('msgModal').style.display = 'flex'; }
    function closeMsgModal() { document.getElementById('msgModal').style.display = 'none'; }
    
    async function checkRequests() {
      if (!IS_ADMIN) return;
      const reqs = await callGAS({ action: "getRequests" });
      if (reqs && !reqs.error) { 
        currentRequests = reqs;
        const badge = document.getElementById('requestBadge');
        if (badge) {
          badge.textContent = reqs.length;
          badge.style.display = reqs.length > 0 ? 'block' : 'none';
        }
      }
    }

    function openRequestModal() {
      const modal = document.getElementById('requestModal');
      const songList = document.getElementById('modalSongList'); 
      const messageList = document.getElementById('messageList');
      modal.style.display = 'flex';
      songList.innerHTML = ''; messageList.innerHTML = '';

      if (currentRequests.length === 0) {
        songList.innerHTML = '<div style="text-align:center; padding:10px; color:#666;">なし</div>';
        messageList.innerHTML = '<div style="text-align:center; padding:10px; color:#666;">なし</div>';
        return;
      }

      currentRequests.forEach(req => {
        const isChat = req.artist === "💬 MESSAGE";
        const div = document.createElement('div');
        div.className = 'request-item';
        
        const textWrapper = document.createElement('div');
        textWrapper.style.flex = "1";
        
        const titleB = document.createElement('b');
        titleB.style.color = isChat ? 'var(--primary)' : 'var(--accent)';
        titleB.textContent = (isChat ? '✉️ ' : '♪ ') + (req.name || "内容なし");
        
        const artistSmall = document.createElement('small');
        artistSmall.style.display = "block";
        artistSmall.style.color = "#888";
        artistSmall.textContent = isChat ? '' : (req.artist || "");
        
        textWrapper.appendChild(titleB); textWrapper.appendChild(artistSmall);
        
        const delBtn = document.createElement('button');
        delBtn.className = 'del-btn'; delBtn.textContent = '削除';
        delBtn.onclick = (e) => { e.stopPropagation(); deleteReq(req.id); };
        
        div.appendChild(textWrapper); div.appendChild(delBtn);

        if (isChat) messageList.appendChild(div); 
        else {
          div.style.cursor = 'pointer';
          div.onclick = () => {
            const fullSongData = allSongs.find(s => (s.name || "").trim() === (req.name || "").trim());
            showAdminMenu(fullSongData || { name: req.name, artist: req.artist }, true, req.id);
          };
          songList.appendChild(div);
        }
      });
    }
    
    async function deleteReq(id) {
      if (confirm("削除しますか？")) {
        await callGAS({ action: "deleteRequest", id: id }, true);
        checkRequests(); openRequestModal(); showToast("削除しました");
      }
    }

    async function addNewSong() {
      const name = document.getElementById('newSong').value;
      const artist = document.getElementById('newArtist').value;
      const status = document.getElementById('newStatus').value;
      if (!name || !artist) return alert("入力してください");
      await callGAS({ action: "addSong", name, artist, status }, true);
      showToast("Notionに追加しました");
      document.getElementById('newSong').value = '';
      document.getElementById('newArtist').value = '';
      fetchData(false, true); 
    }

    function switchView(view) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('page-' + view).classList.add('active');
      document.getElementById('nav-' + view).classList.add('active');
    }

    function generateRandom20() {
      if (allSongs.length === 0) return showToast("曲リストが空です", true);
      let shuffled = [...allSongs].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, 20);
      const container = document.getElementById('randomList');
      const area = document.getElementById('randomSelectionArea');
      container.innerHTML = ''; area.style.display = 'block';

      selected.forEach(s => {
        const row = document.createElement('div');
        row.style.cssText = "display:flex; gap:10px; align-items:center; background:var(--card); padding:10px; border-radius:8px; border:1px solid #333;";
        
        const info = document.createElement('div');
        info.style.cssText = "flex:1; cursor:pointer; display:flex; flex-direction:column;";
        
        const nameSpan = document.createElement('span');
        nameSpan.style.cssText = "font-size:14px; font-weight:bold; color:#ffffff;";
        nameSpan.textContent = s.name || "不明";
        
        const artistSmall = document.createElement('small');
        artistSmall.style.cssText = "color:#cccccc;";
        artistSmall.textContent = s.artist || "不明";
        
        info.appendChild(nameSpan); info.appendChild(artistSmall);
        info.onclick = () => onSongTap(s);
        
        const delBtn = document.createElement('button');
        delBtn.textContent = "×";
        delBtn.style.cssText = "background:none; border:none; color:var(--error); font-size:18px; padding:0 10px; cursor:pointer;";
        delBtn.onclick = () => row.remove();
        
        row.appendChild(info); row.appendChild(delBtn); container.appendChild(row);
      });
      area.scrollIntoView({ behavior: 'smooth' });
    }

    function downloadSetlistImage() {
      const logText = document.getElementById('resultArea').value.trim();
      if (!logText) return showToast("ログが空です。曲を記録してください", true);

      const lines = logText.split('\n').filter(l => l.trim() !== '');
      
      const songs = lines.map((line, index) => {
        const songName = line.replace(/^\d+:\d+(:\d+)?\s*/, '').trim();
        return `${index + 1}. ${songName}`;
      });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const padding = 80;
      const lineHeight = 70;
      const fontSize = 34;
      const titleHeight = 120;

      canvas.width = 1080;
      canvas.height = padding * 2 + titleHeight + (songs.length * lineHeight);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#111111";
      ctx.font = `bold 56px 'Segoe UI', 'Noto Sans JP', sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText("本日のセットリスト", canvas.width / 2, padding + 56);

      ctx.beginPath();
      ctx.moveTo(padding, padding + titleHeight - 30);
      ctx.lineTo(canvas.width - padding, padding + titleHeight - 30);
      ctx.strokeStyle = "#dddddd";
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.font = `bold ${fontSize}px 'Segoe UI', 'Noto Sans JP', sans-serif`;
      ctx.fillStyle = "#333333";
      ctx.textAlign = "left";

      const startY = padding + titleHeight + fontSize;
      songs.forEach((song, i) => {
        ctx.fillText(song, padding, startY + (i * lineHeight));
      });

      const link = document.createElement('a');
      const dateStr = new Date().toLocaleDateString('ja-JP').replace(/\//g, '');
      link.download = `HanamiYa_Setlist_${dateStr}.png`;
      link.href = canvas.toDataURL('image/png');
      setTimeout(() => {
        link.click();
        showToast("画像をダウンロードしました！");
      }, 100);
    }

    setInterval(() => { if (IS_ADMIN) syncWithServer(); }, 3000);
    
    async function syncWithServer() {
      if (!IS_ADMIN) return;
      const res = await callGAS({ action: 'checkExternalStart' });
      if (res && res.startTime) {
        const serverTime = parseInt(res.startTime);
        if (!isRunning || Math.abs(startTime - serverTime) > 1000) {
          startTime = serverTime; isRunning = true; updateButtonUI(true);
        }
      } else if (isRunning) {
        isRunning = false; updateButtonUI(false);
      }
    }

    setInterval(() => {
      if (isRunning && startTime) {
        const diff = Math.max(0, Date.now() - startTime);
        const hours = Math.floor(diff / 3600000); 
        const min = Math.floor((diff % 3600000) / 60000);
        const sec = Math.floor((diff % 60000) / 1000);
        
        const display = document.getElementById('timerDisplay');
        if (display) {
          display.textContent = hours > 0 
            ? `${hours}:${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`
            : `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }
      }
    }, 1000);

    function closeConfirm() { document.getElementById('confirmOverlay').style.display = 'none'; const oldLinks = document.getElementById('adminLinkGroup'); if (oldLinks) oldLinks.remove(); }
    
    function closeRequestConfirm() { document.getElementById('requestConfirmOverlay').style.display = 'none'; }
    
    function closeRequestModal() { document.getElementById('requestModal').style.display = 'none'; }
    function copyLog() { navigator.clipboard.writeText(document.getElementById('resultArea').value); showToast("コピーしました！"); }

    window.addEventListener('load', () => {
      const backup = localStorage.getItem('setlist_backup');
      if (backup) document.getElementById('resultArea').value = backup;
    });

    window.addEventListener('DOMContentLoaded', () => {
      const songList = document.getElementById('songList');
      const topBtn = document.getElementById('pageTopBtn');
      if (songList) {
        songList.addEventListener('scroll', () => {
          songList.scrollTop > 50 ? topBtn.classList.add('show') : topBtn.classList.remove('show');
        });
      }
    });

    function scrollToTop() {
      const songList = document.getElementById('songList');
      if (songList) songList.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
